<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluffy Paws - Pesan Layanan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style1.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-blue shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index1.html">🐾 Fluffy Paws</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index1.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link active" href="pesan1.html">Pesan Layanan</a></li>
                    <li class="nav-item"><a class="nav-link" href="login1.html">Login Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card card-custom">
                    <div class="card-header bg-custom-blue text-center py-3">
                        <h4 class="mb-0 fw-bold text-white">Formulir Detail Antrean Grooming</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form id="formGrooming">
                            
                            <h5 class="fw-bold text-custom-blue mt-2">1. Data Pawrents (Pemilik)</h5>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nama Lengkap</label>
                                    <input type="text" class="form-control" id="namaPemilik" placeholder="Masukkan nama" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Nomor WhatsApp</label>
                                    <input type="number" class="form-control" placeholder="0813..." required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Alamat Lengkap</label>
                                <textarea class="form-control" rows="2" placeholder="Diisi jika butuh layanan antar-jemput..." required></textarea>
                            </div>

                            <hr>

                            <h5 class="fw-bold text-custom-blue mt-4">2. Detail Anabul</h5>
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Nama Anabul</label>
                                    <input type="text" class="form-control" id="namaAnabul" placeholder="Cth: Mochi" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Jenis Hewan</label>
                                    <select class="form-select" required>
                                        <option value="">Pilih...</option>
                                        <option value="Kucing">Kucing</option>
                                        <option value="Anjing">Anjing</option>
                                        <option value="Kelinci">Kelinci</option>
                                        <option value="Lainnya">Lainnya</option>
                                    </select>
                                </div>
                            </div>

                            <hr>

                            <h5 class="fw-bold text-custom-blue mt-4">3. Reservasi Jadwal & Layanan</h5>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Tanggal Grooming</label>
                                    <input type="date" class="form-control" id="tanggalGrooming" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Perkiraan Waktu</label>
                                    <input type="time" class="form-control" id="waktuGrooming" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">Pilihan Paket Layanan</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="layanan" required>
                                    <label class="form-check-label">Basic Grooming</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="layanan">
                                    <label class="form-check-label">Full Grooming + Treatment</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="layanan">
                                    <label class="form-check-label">Cukur Saja</label>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Catatan Khusus (Kondisi/Penyakit)</label>
                                <textarea class="form-control" rows="3" placeholder="Contoh: Usia 2 tahun, alergi sampo stroberi, penakut dengan hair dryer..." required></textarea>
                            </div>

                            <button type="submit" class="btn bg-custom-blue text-white w-100 py-2 fw-bold mt-2">Kirim Antrean Sekarang</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#formGrooming').on('submit', function(e) {
                e.preventDefault();
                
                let namaPawrent = $('#namaPemilik').val();
                let namaPet = $('#namaAnabul').val();
                let tanggal = $('#tanggalGrooming').val();
                let waktu = $('#waktuGrooming').val();
                
                alert("Pemesanan Berhasil!\n\nAntrean atas nama " + namaPawrent + " untuk anabul " + namaPet + " sudah tercatat.\n\nJadwal Anda: " + tanggal + " Jam " + waktu + "\n\nTerima kasih!");
                
                $('#formGrooming')[0].reset();
            });
        });
    </script>
</body>
</html>
