<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluffy Paws - Login Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style1.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-blue shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index1.html">🐾 Fluffy Paws</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index1.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="pesan1.html">Pesan Layanan</a></li>
                    <li class="nav-item"><a class="nav-link active" href="login1.html">Login Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-custom mt-4">
                    <div class="card-body p-5">
                        
                        <h3 class="text-center mb-4 fw-bold text-custom-blue">Login Admin 🔐</h3>
                        
                        <form id="formLogin">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="usernameAdmin" placeholder="Masukkan ID admin" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Masukkan password" required>
                            </div>
                            <button type="submit" class="btn bg-custom-blue text-white w-100 py-2 fw-bold">Masuk</button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <small class="text-muted">Halaman khusus Admin.</small>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#formLogin').on('submit', function(e) {
                e.preventDefault();
                let adminName = $('#usernameAdmin').val();
                alert("Login Berhasil!\n\nSelamat datang admin " + adminName + "! 👋");
                $('#formLogin')[0].reset();
            });
        });
    </script>
</body>
</html>
